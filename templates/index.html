<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <title>Dashboard</title>
</head>
<body>

    <div class="container">
        <h2 class="word">Welcome, {{ session.username }}!</h2>
    
        <form action="{{ url_for('admin') }}" method="post">
            <div class="textbox">
                <br><p class="word">Choose your role</p>
                <button class="btn" type="submit" >Owner of a cat</button>
                
            </div>
        </form>
        <form action="{{ url_for('user') }}" method="post">
            <div class="textbox">
                <button class="btn" type="submit">I want to be owner of a cat</button>
            </div>
        </form>
    </div>
        
</body>
</html>
